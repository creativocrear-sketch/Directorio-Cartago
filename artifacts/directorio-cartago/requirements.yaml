    aspect_ratio: "16:9"
  - path: "artifacts/directorio-cartago/public/images/default-business.png"
    description: "A beautiful, minimalist 3D rendering of a modern storefront with a warm, inviting atmosphere. Soft lighting, warm color palette, clean architectural lines, suitable as a high-end placeholder image for a business directory."
