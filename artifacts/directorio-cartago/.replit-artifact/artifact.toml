kind = "web"
previewPath = "/"
title = "Directorio de Cartago"
version = "1.0.0"
id = "artifacts/directorio-cartago"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25788
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/directorio-cartago run dev"

[services.env]
PORT = "25788"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/directorio-cartago", "run", "build"]
publicDir = "artifacts/directorio-cartago/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
